name: Deploy server (Fly.io)

# Публичный деплой контейнера server/ (T9.0). Триггерится только на изменения server/
# (веб/пайплайн деплоятся своими джобами в ci.yml — Pages), плюс ручной запуск.
on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  # Пока в репозитории нет секрета FLY_API_TOKEN (аккаунт Fly ещё не заведён — см. T9.0),
  # deploy-job ниже чисто ПРОПУСКАЕТСЯ (skipped), а не падает красным. Секрет в job-level
  # `if` по контракту GitHub недоступен, а output этого джоба (контекст needs) — доступен.
  check:
    name: есть ли FLY_API_TOKEN
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.guard.outputs.present }}
    steps:
      - id: guard
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set +e
          present=false
          if [ -n "$FLY_API_TOKEN" ]; then present=true; fi
          echo "present=$present" >> "$GITHUB_OUTPUT"
          echo "FLY_API_TOKEN present=$present"
          exit 0

  deploy:
    name: fly deploy
    needs: check
    if: needs.check.outputs.present == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      # Гейт: не деплоим красное. Дублирует проверки server-джоба из ci.yml намеренно —
      # так деплой самодостаточен и не зависит от порядка/статуса другого workflow.
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: gofmt (нет неотформатированных файлов)
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

      # Деплой воспроизводим той же командой, что и локально: `fly deploy`.
      # --remote-only: образ собирается на билдере Fly, локальный Docker не нужен.
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
