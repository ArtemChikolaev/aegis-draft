name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline:
    name: Go pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: pipeline/go.mod
          cache: false # пайплайн на чистой stdlib, go.sum нет — кэшировать нечего
      - name: gofmt (нет неотформатированных файлов)
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  server:
    name: Go server (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    # Postgres для интеграционных тестов стора (users/identities). Без DATABASE_URL
    # эти тесты скипаются (локально без Docker), здесь — гоняются по-настоящему.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: gofmt (нет неотформатированных файлов)
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
        env:
          DATABASE_URL: postgres://aegis:aegis@localhost:5432/aegis?sslmode=disable

  web:
    name: Web (данные + логика + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # T3.13: Vitest/Playwright/golden — на эфемерном mock (gen:mock не коммитится).
      # Production dataset в git обновляет data-refresh; deploy-job собирает его без gen:mock.
      - name: Mock dataset (CI unit/E2E only)
        run: npm run gen:mock
      - name: Валидация контракта данных (JSON Schema)
        run: npm run validate:data
      - name: Unit tests (Vitest)
        run: npm run test
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: Browser smoke (Playwright)
        run: npm run test:e2e
      - run: npm run typecheck
      - run: npm run build

  antipatterns:
    name: Antipattern scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .claude/skills/self-review-checklist/tools/antipatterns_grep.sh

  deploy:
    name: Deploy to GitHub Pages
    needs: [pipeline, web, antipatterns]
    # workflow_dispatch пускаем в деплой намеренно. Артефакт `github-pages` собирается ВНУТРИ
    # этого джоба, поэтому «Re-run failed jobs» заливает в тот же run второй артефакт с тем же
    # именем, и deploy-pages падает на «Multiple artifacts named github-pages» (поймано 2026-07-20
    # после аварии Pages). Лечится только НОВЫМ запуском — без этого условия единственным
    # способом его получить был бы пустой коммит.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web (сабпуть Pages + реальный датасет из data-refresh)
        working-directory: web
        env:
          VITE_BASE: /aegis-draft/
        run: |
          npm ci
          # Деплой — закоммиченный OpenDota-слайс (data-refresh). gen:mock — fallback если data/ пуст.
          [ -f public/data/manifest.json ] || npm run gen:mock
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
