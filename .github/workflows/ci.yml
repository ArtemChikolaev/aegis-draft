name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline:
    name: Go pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: pipeline/go.mod
          cache: false # пайплайн на чистой stdlib, go.sum нет — кэшировать нечего
      - name: gofmt (нет неотформатированных файлов)
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  server:
    name: Go server (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: gofmt (нет неотформатированных файлов)
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  web:
    name: Web (данные + логика + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # T3.13: Vitest/Playwright/golden — на эфемерном mock (gen:mock не коммитится).
      # Production dataset в git обновляет data-refresh; deploy-job собирает его без gen:mock.
      - name: Mock dataset (CI unit/E2E only)
        run: npm run gen:mock
      - name: Валидация контракта данных (JSON Schema)
        run: npm run validate:data
      - name: Unit tests (Vitest)
        run: npm run test
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: Browser smoke (Playwright)
        run: npm run test:e2e
      - run: npm run typecheck
      - run: npm run build

  antipatterns:
    name: Antipattern scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .claude/skills/self-review-checklist/tools/antipatterns_grep.sh

  deploy:
    name: Deploy to GitHub Pages
    needs: [pipeline, web, antipatterns]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web (сабпуть Pages + реальный датасет из data-refresh)
        working-directory: web
        env:
          VITE_BASE: /aegis-draft/
        run: |
          npm ci
          # Деплой — закоммиченный OpenDota-слайс (data-refresh). gen:mock — fallback если data/ пуст.
          [ -f public/data/manifest.json ] || npm run gen:mock
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
