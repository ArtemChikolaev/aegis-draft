name: Data refresh

# Крон-пересборка реального tier-1 датасета из OpenDota: resumable --collect-window
# пишет web/public/data/*.json, коммитит изменения в main → push триггерит CI-деплой.
# Сбор resumable: raw-кэш персистится между запусками (actions/cache), каждый прогон
# добирает до дневного потолка Free Tier (~3000 req/day), полное окно доезжает за
# несколько дней дейлик-крона. Ручной старт/докрутка — workflow_dispatch.
on:
  schedule:
    - cron: "0 6 * * *" # ежедневно 06:00 UTC
  workflow_dispatch:
    inputs:
      window:
        description: "Окно сбора: last_1y|last_2y|last_5y"
        default: "last_5y"
      requestBudget:
        description: "Максимум реальных HTTP attempts за прогон (< 3000/day Free Tier)"
        default: "2000"
      minEventMatches:
        description: "Порог матчей на событие (tier-1 шум)"
        default: "8"
      maxMatchesPerLeague:
        description: "Потолок деталей на событие (0 = без потолка, нужен для pro career parity с 322-0)"
        default: "0"

permissions:
  contents: write # коммит обновлённых данных в main

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: pipeline/go.mod
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # Персистим raw-кэш OpenDota между прогонами: resumable-сбор продолжает с первого
      # cache miss, а не начинает с нуля. Rolling key + restore-keys накапливают кэш.
      - name: Restore OpenDota raw cache
        uses: actions/cache@v4
        with:
          path: pipeline/data/raw
          key: opendota-raw-${{ github.run_id }}
          restore-keys: |
            opendota-raw-
      - name: Collect real tier-1 dataset from OpenDota (resumable window)
        working-directory: pipeline
        run: |
          go run ./cmd/build \
            --fetch-opendota --emit-domain --collect-window \
            --window "${{ github.event.inputs.window || 'last_5y' }}" \
            --min-event-matches "${{ github.event.inputs.minEventMatches || '8' }}" \
            --max-matches-per-league "${{ github.event.inputs.maxMatchesPerLeague || '0' }}" \
            --request-budget "${{ github.event.inputs.requestBudget || '2000' }}" \
            --as-of "$(date -u +%F)" \
            --out ../web/public/data \
            --schema-validator ../.claude/skills/data-contract/tools/validate_data.mjs
      - name: Sanity check (непустой датасет)
        run: |
          node -e "const p=require('./web/public/data/packs.json'); if(!Array.isArray(p)||p.length===0){console.error('пустой packs.json — не коммитим');process.exit(1)}; console.log('packs:',p.length)"
      - name: Commit & push refreshed data
        run: |
          git config user.name "aegis-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/public/data
          if git diff --cached --quiet; then
            echo "Данные не изменились — коммит не нужен"
            exit 0
          fi
          git commit -m "chore(data): refresh dataset $(date -u +%F)"
          git pull --rebase origin main
          git push
