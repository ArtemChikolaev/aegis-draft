name: Data refresh

# Крон-пересборка реального датасета из OpenDota: пайплайн --emit-domain пишет
# web/public/data/*.json, коммитит изменения в main → push триггерит CI-деплой на Pages.
# Ручной запуск — через workflow_dispatch (первый прогон реальных данных).
on:
  schedule:
    - cron: "0 6 * * *" # ежедневно 06:00 UTC
  workflow_dispatch:
    inputs:
      matchDetailLimit:
        description: "Сколько матчей тянуть в деталях"
        default: "100"
      requestBudget:
        description: "Максимум реальных HTTP attempts"
        default: "150"

permissions:
  contents: write # коммит обновлённых данных в main

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: pipeline/go.mod
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Collect real dataset from OpenDota
        working-directory: pipeline
        run: |
          go run ./cmd/build \
            --fetch-opendota --emit-domain \
            --match-detail-limit "${{ github.event.inputs.matchDetailLimit || '100' }}" \
            --request-budget "${{ github.event.inputs.requestBudget || '150' }}" \
            --as-of "$(date -u +%F)" \
            --out ../web/public/data \
            --schema-validator ../.claude/skills/data-contract/tools/validate_data.mjs
      - name: Sanity check (непустой датасет)
        run: |
          node -e "const p=require('./web/public/data/packs.json'); if(!Array.isArray(p)||p.length===0){console.error('пустой packs.json — не коммитим');process.exit(1)}; console.log('packs:',p.length)"
      - name: Commit & push refreshed data
        run: |
          git config user.name "aegis-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/public/data
          if git diff --cached --quiet; then
            echo "Данные не изменились — коммит не нужен"
            exit 0
          fi
          git commit -m "chore(data): refresh dataset $(date -u +%F)"
          git pull --rebase origin main
          git push
