# aegis-draft — единая входная точка (prod-like lab).
# / → React SPA · /data/* → static JSON · /api/* → Go API (chi, ADR 0002).
# Не заменяет GitHub Pages; локальный/staging стенд через docker compose.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Базовый rate limit для будущих /api/* (сейвы/лидерборд/дейлик).
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

  upstream api {
    server api:8080;
  }

  server {
    listen 80;
    server_name localhost;

    # Security headers (минимальный набор для lab/staging).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # --- Go API (динамика; игровые JSON не проксируем — ADR 0002) ---
    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static-first game data (pipeline → public/data) ---
    location = /data/manifest.json {
      alias /usr/share/nginx/data/manifest.json;
      add_header Cache-Control "public, max-age=300";
    }

    location /data/ {
      alias /usr/share/nginx/data/;
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    # --- Vite build (immutable hashed assets) ---
    location /assets/ {
      root /usr/share/nginx/html;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- SPA fallback ---
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }
  }
}
